<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I Miss You 💔</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }

        .container {
            text-align: center;
            position: relative;
        }

        .message {
            font-size: 4rem;
            font-weight: bold;
            color: #ffffff;
            text-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            margin-bottom: 30px;
            letter-spacing: 2px;
            animation: fadeInScale 1.5s ease-out;
        }

        .heart {
            font-size: 3rem;
            display: inline-block;
            margin: 0 10px;
            animation: heartBeat 1.2s ease-in-out infinite;
        }

        .floating-hearts {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
        }

        .float-heart {
            position: absolute;
            font-size: 2rem;
            opacity: 0.8;
            animation: float 3s ease-in infinite;
        }

        @keyframes fadeInScale {
            from {
                opacity: 0;
                transform: scale(0.5);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes heartBeat {
            0%, 100% {
                transform: scale(1);
            }
            25% {
                transform: scale(1.1);
            }
            50% {
                transform: scale(1.2);
            }
            75% {
                transform: scale(1.1);
            }
        }

        @keyframes float {
            0% {
                transform: translateY(100vh) translateX(0);
                opacity: 1;
            }
            100% {
                transform: translateY(-10vh) translateX(100px);
                opacity: 0;
            }
        }

        .subtitle {
            font-size: 1.5rem;
            color: #ffffff;
            margin-top: 40px;
            animation: fadeIn 2s ease-out 0.5s forwards;
            opacity: 0;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
            }
        }

        .glow-text {
            animation: glow 2s ease-in-out infinite;
        }

        @keyframes glow {
            0%, 100% {
                text-shadow: 0 4px 15px rgba(255, 255, 255, 0.3);
            }
            50% {
                text-shadow: 0 4px 25px rgba(255, 255, 255, 0.8), 0 0 40px rgba(255, 182, 193, 0.6);
            }
        }

        @media (max-width: 768px) {
            .message {
                font-size: 2.5rem;
            }
            .heart {
                font-size: 2rem;
            }
            .subtitle {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>
    <div class="floating-hearts" id="floatingHeartsContainer"></div>
    
    <div class="container">
        <div class="message glow-text">
            I <span class="heart">❤️</span> Miss You
        </div>
        <div class="subtitle">Thinking of you...</div>
        <div class="subtitle" style="margin-top: 20px; font-size: 1.8rem;">ma nvang vi atak</div>
    </div>

    <script>
        // Create floating hearts
        const container = document.getElementById('floatingHeartsContainer');
        const hearts = ['❤️', '💔', '💕', '💖', '💗'];

        function createFloatingHeart() {
            const heart = document.createElement('div');
            heart.className = 'float-heart';
            heart.textContent = hearts[Math.floor(Math.random() * hearts.length)];
            heart.style.left = Math.random() * 100 + '%';
            heart.style.animationDelay = Math.random() * 0.5 + 's';
            heart.style.animationDuration = (3 + Math.random() * 2) + 's';
            
            container.appendChild(heart);

            // Remove element after animation completes
            setTimeout(() => {
                heart.remove();
            }, 5000);
        }

        // Create floating hearts at intervals
        setInterval(createFloatingHeart, 300);

        // Create initial hearts
        for (let i = 0; i < 5; i++) {
            setTimeout(createFloatingHeart, i * 200);
        }
    </script>
</body>
</html>
